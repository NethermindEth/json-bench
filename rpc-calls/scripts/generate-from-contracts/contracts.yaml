    address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"
    category: erc20
    calls:
      - { method: name }
      - { method: symbol }
      - { method: decimals }
      - { method: totalSupply }
      - method: balanceOf
        args: ["0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"]
      - method: allowance
        args:
          - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
          - "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"

