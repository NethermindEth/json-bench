# Curated mainnet contracts and the view/pure calls we synthesize for them.
#
# Defaults (omitted fields):
#   chain_id: 1
#   auto_expand: false
#   abi_address: <same as address>           # init.sh auto-resolves single-hop proxies
#   slug: <lowercased name, non-alnum → '-'>
#
# Args in YAML are typed values matching the ABI method's input list. The
# generator validates arity/types against the loaded ABI and fails loudly on
# mismatch. uint256 args may be supplied as YAML ints or as 0x-/decimal-quoted
# strings — anything wider than int64 must be a string.
#
# arg_registry is consumed only when auto_expand: true (deferred from v1).

arg_registry:
  addresses:
    - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"  # vitalik.eth
    - "0xbe0eb53f46cd790cd13851d5eff43d12404d33e8"  # Binance hot wallet
    - "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"  # WETH (self-reference)
  uints:
    - 0
    - 1
    - 100
    - 1000000

contracts:
