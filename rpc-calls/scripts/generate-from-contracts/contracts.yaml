  - name: ENS NameWrapper
    address: "0xD4416b13d2b3a9aBae7AcD5D6C2BbDBE25686401"
    category: erc721
    # ENS NameWrapper is ERC-1155 (not ERC-721), so it exposes `name` but no
    # `symbol`/`totalSupply`/`tokenURI`. balanceOf has the ERC-1155 signature.
    calls:
      - { method: name }
      - method: supportsInterface
        args: ["0x80ac58cd"]   # ERC-721 interface ID
      - method: supportsInterface
        args: ["0xd9b67a26"]   # ERC-1155 interface ID
      - { method: owner }
      - { method: ens }
      - { method: registrar }

