test_name: "Realistic mainnet traffic mix"
description: "Approximates observed mainnet JSON-RPC traffic: eth_call ~53%, eth_getBlockByNumber ~10%, eth_getBalance ~7%, eth_chainId ~6%, eth_getBlockReceipts ~6%, eth_blockNumber ~5%, plus a tail of eth_getLogs and the contract-state methods (estimateGas/getCode/getProof/getStorageAt) and a small debug_traceCall slice. ~83% of weight resolves to head/latest; the remaining ~17% targets historical fixtures pinned to specific block heights."
clients:
  - geth
  - nethermind
  - reth
  - erigon
  - besu
duration: "2m"
rps: 100
vus: 20
calls:
  - name: "eth_call (head)"
    file: "./rpc-calls/eth_call-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 420
  - name: "eth_call (historical)"
    file: "./rpc-calls/eth_call-mainnet.jsonl"
    file_type: "jsonl"
    weight: 108
  - name: "eth_getBlockByNumber (latest)"
    method: "eth_getBlockByNumber"
    params:
      - "latest"
      - false
    weight: 103
  - name: "eth_getBalance (latest)"
    method: "eth_getBalance"
    params:
      - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
      - "latest"
    weight: 69
  - name: "eth_chainId"
    method: "eth_chainId"
    params: []
    weight: 57
  - name: "eth_getBlockReceipts (latest)"
    method: "eth_getBlockReceipts"
    params:
      - "latest"
    weight: 56
  - name: "eth_blockNumber"
    method: "eth_blockNumber"
    params: []
    weight: 50
  - name: "eth_getLogs (historical)"
    file: "./rpc-calls/get-logs-mainnet.jsonl"
    file_type: "jsonl"
    weight: 50
  - name: "eth_estimateGas (head)"
    file: "./rpc-calls/eth_estimateGas-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 25
  - name: "eth_getProof (head)"
    file: "./rpc-calls/eth_getProof-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 20
  - name: "eth_getCode (head)"
    file: "./rpc-calls/eth_getCode-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 15
  - name: "eth_getStorageAt (head)"
    file: "./rpc-calls/eth_getStorageAt-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 15
  - name: "debug_traceCall (historical)"
    file: "./rpc-calls/debug_traceCall-mainnet.jsonl"
    file_type: "jsonl"
    weight: 12
