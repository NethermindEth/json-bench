test_name: "Realistic mainnet traffic mix (head only)"
description: "Head-only variant of realistic-mix.yaml. All calls target `latest`/head state, so the workload is safe on snap-synced and full nodes that may not retain historical state. Excludes eth_getLogs (long-range scans), eth_call against pinned historical blocks, and debug_traceCall against pinned historical blocks. The remaining mix preserves the relative weights of the head-targeted methods from the original distribution."
clients:
  - geth
  - nethermind
  - reth
  - erigon
  - besu
duration: "2m"
rps: 100
vus: 20
calls:
  - name: "eth_call (head)"
    file: "./rpc-calls/eth_call-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 420
  - name: "eth_getBlockByNumber (latest)"
    method: "eth_getBlockByNumber"
    params:
      - "latest"
      - false
    weight: 103
  - name: "eth_getBalance (latest)"
    method: "eth_getBalance"
    params:
      - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
      - "latest"
    weight: 69
  - name: "eth_chainId"
    method: "eth_chainId"
    params: []
    weight: 57
  - name: "eth_getBlockReceipts (latest)"
    method: "eth_getBlockReceipts"
    params:
      - "latest"
    weight: 56
  - name: "eth_blockNumber"
    method: "eth_blockNumber"
    params: []
    weight: 50
  - name: "eth_estimateGas (head)"
    file: "./rpc-calls/eth_estimateGas-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 25
  - name: "eth_getProof (head)"
    file: "./rpc-calls/eth_getProof-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 20
  - name: "eth_getCode (head)"
    file: "./rpc-calls/eth_getCode-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 15
  - name: "eth_getStorageAt (head)"
    file: "./rpc-calls/eth_getStorageAt-mainnet-latest.jsonl"
    file_type: "jsonl"
    weight: 15
