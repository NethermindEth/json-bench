apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    # Default datasource for dashboards that template ${DS_PROMETHEUS}.
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: "POST"
    
  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: jsonrpc_bench
    user: postgres
    isDefault: false
    editable: true
    jsonData:
      sslmode: "disable"
      maxOpenConns: 100
      maxIdleConns: 100
      maxIdleConnsAuto: true
      connMaxLifetime: 14400
      postgresVersion: 1300
      timescaledb: false
    secureJsonData:
      password: "postgres"
      
# The "JSON-RPC Bench API" SimpleJSON datasource and the dashboards that used
# it (baseline-comparison, jsonrpc-benchmark, jsonrpc-benchmark-enhanced) were
# removed: SimpleJSON is an AngularJS plugin that Grafana 13 will not load
# (https://grafana.com/docs/grafana/latest/developers/angular_deprecation/),
# so those dashboards could never query their data source. The React dashboard
# at http://localhost:8080 covers the same use cases against the same backend
# and is the canonical UI; this Grafana instance is kept only for the k6
# real-time view backed by Prometheus.
